{% extends "base.html" %}
{% block content %}
<section class="section">
  <div class="container-sm" style="max-width: 480px;">
    <div class="form-card">
      <h1>{{ t('auth_login') }}</h1>
      <p class="sub">{{ 'منصة B2B مغلقة. الحسابات تُنشأ عبر مدير المنصة أو البراند.' if lang=='ar' else 'Closed B2B platform. Accounts are created by your admin or brand.' }}</p>
      <form method="post">
        <div class="field">
          <label>{{ t('auth_email') }}</label>
          <input type="email" name="email" value="{{ email or '' }}" required autocomplete="email" autofocus>
        </div>
        <div class="field">
          <label>{{ t('auth_password') }}</label>
          <input type="password" name="password" required autocomplete="current-password">
        </div>
        <button class="btn btn-primary btn-block">{{ t('auth_login') }}</button>
      </form>
    </div>
  </div>
</section>
{% endblock %}
